services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soitic_backend
    working_dir: /var/www
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/var/www
      - ./data:/data:ro
    command: sh -c "composer install && php artisan key:generate --force && php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soitic_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
